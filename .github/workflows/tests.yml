name: Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container-image }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            container-image: python:3.11-slim
          - python-version: "3.12"
            container-image: python:3.12-slim
          - python-version: "3.13"
            container-image: python:3.13-slim
          - python-version: "3.14"
            container-image: python:3.14-slim

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r test-requirements.txt build

      - name: Prepare generated version module
        run: |
          python setup.py --version

      - name: Run source unit tests
        run: |
          python -c "import pyamf.tests; pyamf.tests.main()"

      - name: Build package artifacts
        run: |
          rm -rf dist
          python -m build --outdir dist

      - name: Test installed wheel package
        run: |
          python -m venv /tmp/py3amf-wheel
          /tmp/py3amf-wheel/bin/python -m pip install --upgrade pip
          /tmp/py3amf-wheel/bin/python -m pip install dist/*.whl
          /tmp/py3amf-wheel/bin/python -m pip install -r test-requirements.txt
          cd /tmp
          PYTHONPATH= /tmp/py3amf-wheel/bin/python - <<'PY'
          import os
          import pathlib

          import pyamf
          import pyamf.remoting

          repo = pathlib.Path(os.environ['GITHUB_WORKSPACE']).resolve()
          package_path = pathlib.Path(pyamf.__file__).resolve()

          if repo in package_path.parents:
              raise SystemExit(
                  'imported pyamf from source checkout: %s' % package_path)

          body = pyamf.remoting.encode(
              pyamf.remoting.Envelope(amfVersion=pyamf.AMF3))
          pyamf.remoting.decode(body.getvalue())

          import pyamf.tests
          pyamf.tests.main()
          PY

      - name: Test installed source package
        run: |
          python -m venv /tmp/py3amf-sdist
          /tmp/py3amf-sdist/bin/python -m pip install --upgrade pip
          /tmp/py3amf-sdist/bin/python -m pip install dist/*.tar.gz
          /tmp/py3amf-sdist/bin/python -m pip install -r test-requirements.txt
          cd /tmp
          PYTHONPATH= /tmp/py3amf-sdist/bin/python - <<'PY'
          import os
          import pathlib

          import pyamf
          import pyamf.remoting

          repo = pathlib.Path(os.environ['GITHUB_WORKSPACE']).resolve()
          package_path = pathlib.Path(pyamf.__file__).resolve()

          if repo in package_path.parents:
              raise SystemExit(
                  'imported pyamf from source checkout: %s' % package_path)

          body = pyamf.remoting.encode(
              pyamf.remoting.Envelope(amfVersion=pyamf.AMF3))
          pyamf.remoting.decode(body.getvalue())

          import pyamf.tests
          pyamf.tests.main()
          PY
